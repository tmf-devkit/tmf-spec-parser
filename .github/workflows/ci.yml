name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly spec freshness check — runs Monday 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check tmf_spec_parser tests

      - name: Run tests
        run: pytest --tb=short -q

  # Weekly job: run the parser against live TMForum specs and commit any changes
  refresh:
    name: Weekly spec refresh
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[yaml]"

      - name: Generate tmf_data.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tmf-spec-parser generate \
            --out tmf_data.json \
            --js \
            --diff-out SPEC_CHANGES.md

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tmf_data.json tmf_data.js SPEC_CHANGES.md || true
          git diff --staged --quiet || git commit -m "chore: refresh TMF spec data [skip ci]"
          git push
